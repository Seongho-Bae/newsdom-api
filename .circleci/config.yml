version: 2.1

jobs:
  quality-gate:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install uv
          command: |
            export UV_UNMANAGED_INSTALL=1
            export UV_NO_MODIFY_PATH=1
            curl -LsSf -o /tmp/uv-install.sh https://astral.sh/uv/0.11.3/install.sh
            sh /tmp/uv-install.sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Install project dependencies
          command: |
            source "$BASH_ENV"
            uv sync --locked --extra dev
      - run:
          name: Run warnings-as-errors tests
          command: |
            source "$BASH_ENV"
            PYTHONWARNINGS=error uv run pytest
      - run:
          name: Run coverage quality gate
          command: |
            source "$BASH_ENV"
            uv run pytest --cov=src/newsdom_api --cov-report=term-missing --cov-fail-under=100

workflows:
  quality-gate:
    jobs:
      - quality-gate
