[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "newsdom-api"
version = "0.1.0"
description = "DOM-style parser API for scanned Japanese newspaper PDFs"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = {text = "MIT"}
authors = [{name = "Seongho Bae"}]
dependencies = [
  "fastapi>=0.115,<1.0",
  "uvicorn>=0.30,<1.0",
  "pydantic>=2.9,<3.0",
  "python-multipart>=0.0.9,<1.0",
  "reportlab>=4.2,<5.0",
  "Pillow>=11.0,<13.0",
  "pypdf>=5.0,<7.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3,<9.0",
  "pytest-cov>=5.0,<7.0",
  "httpx>=0.28,<1.0"
]
docs = [
    "mkdocs>=1.6,<2.0",
    "mkdocs-material>=9.6,<9.7",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "integration: requires MinerU CLI and model cache"
]

[tool.coverage.run]
source = ["src/newsdom_api"]

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_covered = false
