version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
