name: Build CI Environment Image

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile.test'
      - '.github/workflows/build-ci-image.yml'
  pull_request:
    paths:
      - 'Dockerfile.test'
      - '.github/workflows/build-ci-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/newsdom-api/ci-env
          tags: |
            type=raw,value=latest
            type=sha

      # Convert repository owner to lowercase for Docker compatibility
      # since ${{ github.repository_owner }} might contain uppercase letters
      - name: Lowercase repository owner
        id: lowercase_owner
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.test
          push: true
          tags: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/newsdom-api/ci-env:latest