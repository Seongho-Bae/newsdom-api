name: Build CI Environment Image

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile.test'
      - '.github/workflows/build-ci-image.yml'
  pull_request:
    paths:
      - 'Dockerfile.test'
      - '.github/workflows/build-ci-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@8e539097bc8bf22f25fb3ebcc9a85c88b776c5f7
        with:
          images: ghcr.io/${{ github.repository_owner }}/newsdom-api/ci-env
          tags: |
            type=raw,value=latest
            type=sha

      # Convert repository owner to lowercase for Docker compatibility
      - name: Lowercase repository owner
        id: lowercase_owner
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push test image
        uses: docker/build-push-action@1a162644f9a7e87d8f4b053101d1d9a712edc18c
        with:
          context: .
          file: ./Dockerfile.test
          push: true
          tags: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/newsdom-api/ci-env:latest