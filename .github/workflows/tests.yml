name: tests

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/seongho-bae/newsdom-api/ci-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reinstall the current code using uv, as the prebuilt image has an older version
      - name: Install current workspace
        run: uv pip install --system -e ".[dev,test]"

      - name: Run tests with warnings as errors
        env:
          PYTHONWARNINGS: error
          PYTHONPATH: src
        run: pytest