site_name: NewsDOM API 매뉴얼
site_url: https://seongho-bae.github.io/newsdom-api/
site_description: 일본어 신문 스캔 PDF를 DOM 형태의 트리로 파싱하는 API
repo_url: https://github.com/Seongho-Bae/newsdom-api
repo_name: Seongho-Bae/newsdom-api

docs_dir: manual

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환

nav:
  - 시작하기: index.md
  - 설치 가이드: installation.md
  - 사용 방법: usage.md
  - 개발 및 기여: development.md
